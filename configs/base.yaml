# CET-Epi Base Configuration
project:
  name: "cet-epi"
  seed: 42

hardware:
  device: "cuda"
  mixed_precision: true
  compile_mode: false

training:
  epochs: 200
  batch_size: 1  # Temporal graphs are sequential
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip: 1.0
  early_stopping: 20

model:
  hidden_dim: 64
  num_layers: 2
  horizon: 1
  dropout: 0.3
  ceo:
    n_macro_nodes: 5  # Will be learned/defined per dataset
    ei_weight: 0.1    # Lambda for emergence regularization
    sparsity_weight: 0.01
    balance_weight: 0.01

logging:
  log_interval: 10
  val_interval: 1
  checkpoint_interval: 50
  tensorboard: true
